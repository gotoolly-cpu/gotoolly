name: Check HTTP Compression

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  compression-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check outbound connectivity
        run: curl -I -sS --max-time 20 https://gotoolly.com/ | egrep -i "content-encoding|content-type" || true

      - name: Verify compression header
        run: |
          set -e
          echo "Checking https://gotoolly.com/ for Content-Encoding header..."
          resp=$(curl -sSI --max-time 20 https://gotoolly.com/ | tr -d '\r')
          echo "Response headers:\n$resp"
          if echo "$resp" | egrep -i "content-encoding: (gzip|br)" > /dev/null; then
            echo "Compression detected. ✅"
            exit 0
          else
            echo "Compression NOT detected. ⚠️ This site may need server-side compression (gzip/brotli)." >&2
            exit 1
          fi
