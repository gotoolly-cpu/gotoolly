name: Check HTTP Compression (multi)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  compression-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check outbound connectivity
        run: curl -I -sS --max-time 20 https://gotoolly.com/ | egrep -i "content-encoding|content-type" || true

      - name: Verify compression for key text assets
        run: |
          set -euo pipefail
          # Add more hosts and assets (fonts, external providers) to the check
          urls=(
            "https://gotoolly.com/"
            "https://gotoolly.com/assets/js/main.js"
            "https://gotoolly.com/assets/css/components.css"
            "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            "https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2"
            "https://fonts.gstatic.com/"
          )
          failures=0
          for u in "${urls[@]}"; do
            echo "Checking $u"
            resp=$(curl -sSI --max-time 20 "$u" | tr -d '\r')
            echo "$resp"
            if echo "$resp" | egrep -i "content-encoding:\s*(br|gzip)" > /dev/null; then
              echo "OK: $u is compressed"
            else
              # For binary assets (images) lack of Content-Encoding is acceptable; we only care about text, fonts, JS/CSS
              echo "MISSING: $u has no Content-Encoding header (br/gzip)" >&2
              failures=$((failures+1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo "Compression missing on $failures resource(s)." >&2
            exit 1
          fi
          echo "All checked text assets are compressed. ✅"